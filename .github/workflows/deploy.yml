name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'd-e-s-o/tetromino'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # TODO: 1.93.1 seems to produce a broken .wasm bundle. Try with
      #       the next stable release.
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          target: wasm32-unknown-unknown
      - run: |
          cargo build --lib --release --target=wasm32-unknown-unknown
          cargo build --lib --release --features='deploy' --target=wasm32-unknown-unknown
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'www/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
